name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: win-x64
            os: ubuntu-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained binary
        run: dotnet publish -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o publish/${{ matrix.rid }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf llama-mcp-${{ matrix.rid }}.tar.gz -C publish ${{ matrix.rid }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: (cd publish && zip -r ../llama-mcp-${{ matrix.rid }}.zip ${{ matrix.rid }})

      - uses: actions/upload-artifact@v4
        with:
          name: llama-mcp-${{ matrix.rid }}
          path: llama-mcp-${{ matrix.rid }}.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
